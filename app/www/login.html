<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTL8125 驱动管理 - 登录</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f1923;
            --card: #1a2a3a;
            --text: #e0e6ed;
            --text-dim: #8a9bb0;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --danger: #ef4444;
            --border: #2a3f56;
            --radius: 10px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f1923 0%, #1a2a3a 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px;
            width: 380px;
            max-width: 90vw;
            text-align: center;
        }
        .icon { font-size: 48px; margin-bottom: 10px; }
        .login-card h1 { font-size: 22px; margin-bottom: 4px; }
        .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 24px; }
        .hint { color: var(--text-dim); font-size: 12px; margin-top: 16px; }
        .form-group { margin-bottom: 12px; }
        input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--primary); }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .btn:hover { background: var(--primary-dark); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-msg {
            color: var(--danger);
            font-size: 13px;
            margin-top: 8px;
            padding: 8px;
            background: rgba(239,68,68,0.1);
            border-radius: 6px;
            display: none;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 400px) { .login-card { padding: 24px; } }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="icon">🖧</div>
        <h1>RTL8125 驱动管理</h1>
        <p class="subtitle">使用系统账号登录</p>

        <form id="loginForm" onsubmit="return doLogin(event)">
            <div class="form-group">
                <input type="text" id="username" placeholder="用户名" required autofocus>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="密码" required>
            </div>
            <div id="loginError" class="error-msg"></div>
            <button type="submit" class="btn" id="loginBtn">登 录</button>
        </form>
        <p class="hint">使用飞牛NAS本地系统账号登录</p>
    </div>

    <script>
    async function doLogin(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const errEl = document.getElementById('loginError');
        const btn = document.getElementById('loginBtn');

        if (!username || !password) {
            errEl.textContent = '请输入用户名和密码';
            errEl.style.display = 'block';
            return false;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>验证中...';
        errEl.style.display = 'none';

        try {
            const resp = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await resp.json();

            if (data.success) {
                window.location.href = '/app.html';
            } else {
                errEl.textContent = data.error || '登录失败';
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '登 录';
            }
        } catch (err) {
            errEl.textContent = '网络错误，请重试';
            errEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = '登 录';
        }
        return false;
    }

    // 检查是否已登录，已登录直接跳转
    fetch('/api/check_auth')
        .then(r => r.json())
        .then(d => { if (d.authenticated) window.location.href = '/app.html'; })
        .catch(() => {});
    </script>
</body>
</html>
